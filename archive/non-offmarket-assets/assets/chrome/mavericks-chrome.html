<!-- OffMarket CinematicChrome + Footer (static integration) -->
<div class="mv-chrome mv-chrome--hero" id="mv-chrome" data-mv-chrome>
  <div class="cinematic-menu-backdrop" data-mv-backdrop aria-hidden="true"></div>

  <!-- Mobile header -->
  <nav class="mv-chrome__nav-mobile om-header" aria-label="Menu">
    <div class="om-header__bar">
      <a href="/" class="mv-chrome__logo-link om-header__logo" aria-label="OffMarket">
        <img src="/assets/logos/mavericks-outline.svg" alt="" class="mv-chrome__logo mv-chrome__logo--light" width="120" height="36" decoding="async">
      </a>
      <div class="om-header__actions">
        <a href="tel:+212000000000" class="om-header__icon-btn om-header__icon-btn--ghost" aria-label="+212 (0) 000 000 000">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907-.339 1.85-.573 2.81-.7A2 2 0 0 1 22 16.92z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <button type="button" class="om-header__icon-btn om-header__icon-btn--ghost om-header__icon-btn--menu" data-mv-menu-toggle aria-expanded="false" aria-label="Menu">
          <span class="mv-menu-toggle-icon" data-mv-toggle-icon aria-hidden="true">
            <span class="mv-menu-toggle-icon__bar mv-menu-toggle-icon__bar--top"></span>
            <span class="mv-menu-toggle-icon__bar mv-menu-toggle-icon__bar--bottom"></span>
          </span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Desktop header -->
  <nav class="mv-chrome__nav-desktop om-header" aria-label="Menu">
    <div class="om-header__bar">
      <a href="/" class="mv-chrome__logo-link om-header__logo" aria-label="OffMarket">
        <img src="/assets/logos/mavericks-outline.svg" alt="" class="mv-chrome__logo mv-chrome__logo--light" width="140" height="42" decoding="async">
      </a>
      <nav class="om-header__nav" aria-label="Navigation principale">
        <a href="/" class="is-active" aria-current="page">Accueil</a>
        <a href="/sur-plan">Sur plan</a>
        <a href="/simulateur">Simulateur</a>
        <a href="#callback-modal">Contact</a>
      </nav>
      <div class="om-header__actions">
        <nav class="mv-lang-switcher mv-lang-switcher--glass" aria-label="Langue">
          <button type="button" class="mv-lang-switcher__btn is-active" aria-current="true">EN</button>
          <span class="mv-lang-switcher__sep" aria-hidden="true">/</span>
          <button type="button" class="mv-lang-switcher__btn">FR</button>
          <span class="mv-lang-switcher__sep" aria-hidden="true">/</span>
          <button type="button" class="mv-lang-switcher__btn">IT</button>
          <span class="mv-lang-switcher__sep" aria-hidden="true">/</span>
          <button type="button" class="mv-lang-switcher__btn">NL</button>
        </nav>
        <a class="om-header__access-btn" href="#callback-modal">Demander l'accès</a>
      </div>
    </div>
  </nav>

  <!-- Menu panel -->
  <div class="cinematic-menu-panel" data-mv-menu-panel role="dialog" aria-modal="true" aria-label="Menu" aria-hidden="true">
    <div class="mv-chrome__menu-mobile-spacer" aria-hidden="true"></div>
    <div class="mv-chrome__menu-desktop-spacer" aria-hidden="true"></div>
    <nav class="cinematic-menu-scroll">
      <ul class="mv-chrome__menu-list" data-mv-menu-items>
        <li class="cinematic-menu-item mv-chrome__menu-item">
          <a href="/" class="cinematic-menu-link">Accueil</a>
        </li>
        <li class="cinematic-menu-item mv-chrome__menu-item">
          <a href="/sur-plan" class="cinematic-menu-link">Sur plan</a>
        </li>
        <li class="cinematic-menu-item mv-chrome__menu-item">
          <a href="/simulateur" class="cinematic-menu-link">Simulateur</a>
        </li>
        <li class="cinematic-menu-item mv-chrome__menu-item">
          <a href="#callback-modal" class="cinematic-menu-link">Contact</a>
        </li>
      </ul>
    </nav>
    <div class="mv-chrome__menu-footer">
      <a class="om-header__access-btn om-header__access-btn--menu" href="#callback-modal">Demander l'accès</a>
      <nav class="mv-lang-switcher mv-lang-switcher--on-dark mv-lang-switcher--mobile-only" aria-label="Langue">
        <button type="button" class="mv-lang-switcher__btn is-active" aria-current="true">EN</button>
        <span class="mv-lang-switcher__sep" aria-hidden="true">/</span>
        <button type="button" class="mv-lang-switcher__btn">FR</button>
        <span class="mv-lang-switcher__sep" aria-hidden="true">/</span>
        <button type="button" class="mv-lang-switcher__btn">IT</button>
        <span class="mv-lang-switcher__sep" aria-hidden="true">/</span>
        <button type="button" class="mv-lang-switcher__btn">NL</button>
      </nav>
      <p class="mv-chrome__menu-brand">OffMarket</p>
      <p class="mv-chrome__menu-tagline">discrète real estate in Marrakech</p>
    </div>
  </div>
</div>
